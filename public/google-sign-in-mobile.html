<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BytzGo — Google Sign-In</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f4f7fb;
      color: #111;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { color: #555; text-align: center; max-width: 320px; margin: 0 0 20px; }
    #status { font-size: 0.9rem; color: #666; min-height: 1.2em; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>Sign in with Google</h1>
  <p>Choose your Google account to continue in BytzGo.</p>
  <div id="button"></div>
  <p id="status"></p>
  <script>
    const params = new URLSearchParams(location.search);
    const role = params.get('role') || 'customer';
    const clientId = '645977332644-4gjjf08268b3irafs4bh8b7guct1i1jb.apps.googleusercontent.com';
    const status = document.getElementById('status');

    function finish(token, error) {
      if (token) {
        status.textContent = 'Success — returning to app…';
        location.href = 'bytzgo://auth?token=' + encodeURIComponent(token);
        return;
      }
      const msg = error || 'Sign-in failed';
      status.textContent = msg;
      location.href = 'bytzgo://auth?error=' + encodeURIComponent(msg);
    }

    async function onCredential(response) {
      status.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential, role }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          finish(null, data.message || 'Google authentication failed');
          return;
        }
        if (!data.token) {
          finish(null, 'No session token from server');
          return;
        }
        finish(data.token);
      } catch (e) {
        finish(null, e.message || 'Network error');
      }
    }

    window.onload = function () {
      if (!window.google || !google.accounts) {
        status.textContent = 'Loading Google…';
        setTimeout(window.onload, 200);
        return;
      }
      google.accounts.id.initialize({
        client_id: clientId,
        callback: onCredential,
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      google.accounts.id.renderButton(document.getElementById('button'), {
        type: 'standard',
        size: 'large',
        theme: 'filled_blue',
        text: 'continue_with',
        width: 280,
      });
      google.accounts.id.prompt();
    };
  </script>
</body>
</html>
