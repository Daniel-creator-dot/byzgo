# BytzGo — single Web Service: API + admin web only (/admin). Mobile app for customers/riders/vendors.
#
# Domain must point to THIS Web Service only (not a separate Static Site).
# Verify API:  curl https://bytzgo.net/api/health  → JSON
# Verify admin: https://bytzgo.net/admin           → login page (not "Cannot GET")
#
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/Daniel-creator-dot/byzgo

services:
  - type: web
    name: byzgo
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build && npm install --prefix backend --omit=dev
    startCommand: npm --prefix backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_WEB
        value: "true"
      - key: SERVE_ADMIN_WEB_ONLY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: bytzgo-9bd89
      - key: GOOGLE_WEB_CLIENT_ID
        value: 645977332644-4gjjf08268b3irafs4bh8b7guct1i1jb.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 645977332644-4gjjf08268b3irafs4bh8b7guct1i1jb.apps.googleusercontent.com
      - key: APP_URL
        value: https://bytzgo.net
      - key: PAYSTACK_CALLBACK_URL
        value: https://bytzgo.net
      - key: SMS_API_KEY
        sync: false
      - key: SMS_BASE_URL
        value: https://www.inteksms.top/api/v1
      - key: SMS_SENDER_ID
        value: bytzee
      - key: SUPABASE_URL
        value: https://ypmiurbtmfiyzmrygonh.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: pictures
