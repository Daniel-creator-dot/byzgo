# BytzGo — one Web Service: Express API + Vite web on the same host (bytzgo.net).
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/Daniel-creator-dot/byzgo
#
# Replaces static-only deploy so /api/* works for Flutter Android + web.
# Flutter APK: MOBILE_API_URL=https://bytzgo.net

services:
  - type: web
    name: byzgo
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build && npm install --prefix backend
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_WEB
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: bytzgo-72f1c
      - key: APP_URL
        value: https://bytzgo.net
      - key: PAYSTACK_CALLBACK_URL
        value: https://bytzgo.net
      - key: SMS_API_KEY
        sync: false
      - key: SMS_BASE_URL
        value: https://www.inteksms.top/api/v1
      - key: SMS_SENDER_ID
        value: bytzee
      # Same-origin API for Vite build (see src/lib/api.ts)
      - key: VITE_API_URL
        value: ""
