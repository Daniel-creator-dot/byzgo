# BytzGo — Web Service blueprint (API + admin at /admin).
#
# Production today: Render service "byzgoback-eu" (srv-d98738e7r5hc73cjogv0, Frankfurt) owns
# www.bytzgo.net / bytzgo.net. Legacy "byzgoback" (Oregon) is suspended.
# Static site "byzgo" is frontend-only — do not attach API domains to it.
# Verify:  .\scripts\verify-render-api.ps1 -Url https://www.bytzgo.net
#
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/Daniel-creator-dot/byzgo

services:
  - type: web
    name: byzgoback-eu
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci && npm run build:render
    startCommand: npm --prefix backend run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_WEB
        value: "true"
      - key: SERVE_ADMIN_WEB_ONLY
        value: "true"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: PG_POOL_MAX
        value: "10"
      - key: PG_IDLE_TIMEOUT_MS
        value: "30000"
      - key: PG_CONNECT_TIMEOUT_MS
        value: "10000"
      - key: PG_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "https://www.bytzgo.net,https://bytzgo.net"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: bytzgo-9bd89
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_WEB_CLIENT_ID
        value: 645977332644-4gjjf08268b3irafs4bh8b7guct1i1jb.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 645977332644-4gjjf08268b3irafs4bh8b7guct1i1jb.apps.googleusercontent.com
      - key: APP_URL
        value: https://www.bytzgo.net
      - key: GOOGLE_SIGN_IN_ENABLED
        value: "true"
      - key: PAYSTACK_CALLBACK_URL
        value: https://www.bytzgo.net
      - key: DISPATCH_OFFER_TTL_SEC
        value: "30"
      - key: SMS_API_KEY
        sync: false
      - key: SMS_BASE_URL
        value: https://www.inteksms.top/api/v1
      - key: SMS_SENDER_ID
        value: bytzee
      - key: SUPABASE_URL
        value: https://ypmiurbtmfiyzmrygonh.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: pictures
      - key: ADMIN_INVITE_SECRET
        sync: false
