# BytzGo — Node Web Service for Flutter APK (NOT a Static Site).
#
# If https://bytzgo.net/api/health returns HTML, the domain is on a Static Site.
# Apply this Blueprint, then attach bytzgo.net to THIS Web Service only.
#
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/Daniel-creator-dot/byzgo
# Verify:  .\scripts\verify-render-api.ps1
#
# Flutter APK: MOBILE_API_URL=https://bytzgo.net

services:
  - type: web
    name: byzgo
    runtime: node
    plan: free
    region: oregon
    # Run build/start inside backend/ so node_modules/.bin (tsx) is on PATH.
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # API-only on Render — do not deploy Vite dist here (Static Site breaks /api/*).
      - key: SERVE_WEB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: bytzgo-72f1c
      - key: APP_URL
        value: https://bytzgo.net
      - key: PAYSTACK_CALLBACK_URL
        value: https://bytzgo.net
      - key: SMS_API_KEY
        sync: false
      - key: SMS_BASE_URL
        value: https://www.inteksms.top/api/v1
      - key: SMS_SENDER_ID
        value: bytzee
